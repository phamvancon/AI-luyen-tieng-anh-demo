        function loadSmartStartThemes(classKey) {
            const themeSelector = document.getElementById("smart-theme-selector");
            if (!themeSelector) return;
            themeSelector.innerHTML = "";
            const themes = smartStartDatabase[classKey];
            if (themes) {
                Object.keys(themes).forEach(key => {
                    const option = document.createElement("option");
                    option.value = `${classKey}_${key}`;
                    option.innerText = themes[key].title.split(" - ")[1] || key;
                    themeSelector.appendChild(option);
                });
                loadSmartThemeContent(themeSelector.value);
            } else {
                // Hỗ trợ fallback nếu một lớp chưa có cấu trúc dữ liệu đầy đủ
                const option = document.createElement("option");
                option.value = "";
                option.innerText = "Chưa có dữ liệu bài học";
                themeSelector.appendChild(option);
            }
        }

        function loadSmartThemeContent(combinedKey) {
            if (!combinedKey) return;
            const parts = combinedKey.split("_");
            const classKey = parts[0] + "_" + parts[1];
            const themeKey = parts[2];
            
            const targetTask = smartStartDatabase[classKey]?.[themeKey];
            if (targetTask) {
                currentActiveTask = targetTask;
                renderReadingTaskUI();
            }
        }
