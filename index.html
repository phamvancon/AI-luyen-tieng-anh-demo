<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMART START AI LEARNING</title>

<!-- TAILWIND -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

body{
    background:#f1f5f9;
    font-family:Arial;
}

.glass{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(15px);
}

.card-hover{
    transition:0.3s;
}

.card-hover:hover{
    transform:translateY(-5px);
}

.scroll-hidden::-webkit-scrollbar{
    display:none;
}

</style>

</head>

<body class="min-h-screen">

<!-- ===================================================== -->
<!-- FIREBASE -->
<!-- GIỮ NGUYÊN LOGIN -->
<!-- ===================================================== -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// =====================================================
// GIỮ NGUYÊN FIREBASE CONFIG CŨ
// =====================================================

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_PROJECT.firebaseapp.com",

    projectId: "YOUR_PROJECT",

    storageBucket: "YOUR_PROJECT.appspot.com",

    messagingSenderId: "XXXX",

    appId: "XXXX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


// =====================================================
// LOGIN
// =====================================================

window.login = async function(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        alert("Đăng nhập thành công");

    }catch(err){

        alert(err.message);

    }

}


// =====================================================
// REGISTER
// =====================================================

window.register = async function(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        await createUserWithEmailAndPassword(
            auth,
            email,
            password
        );

        alert("Đăng ký thành công");

    }catch(err){

        alert(err.message);

    }

}


// =====================================================
// LOGOUT
// =====================================================

window.logout = async function(){

    await signOut(auth);

}


// =====================================================
// AUTO LOGIN
// =====================================================

onAuthStateChanged(auth,(user)=>{

    if(user){

        document.getElementById("authBox")
        .classList.add("hidden");

        document.getElementById("mainApp")
        .classList.remove("hidden");

        document.getElementById("userInfo")
        .innerHTML =
        `
        👋 ${user.email}
        `;

    }else{

        document.getElementById("authBox")
        .classList.remove("hidden");

        document.getElementById("mainApp")
        .classList.add("hidden");

    }

});

</script>

<!-- ===================================================== -->
<!-- LOGIN -->
<!-- ===================================================== -->

<div id="authBox"
class="min-h-screen flex items-center justify-center p-6">

    <div class="glass rounded-3xl shadow-2xl p-8 w-full max-w-md">

        <h1 class="text-4xl font-black text-center mb-6">

            🎓 SMART START AI

        </h1>

        <input
        id="email"
        type="email"
        placeholder="Email"
        class="w-full p-4 rounded-2xl border mb-4">

        <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full p-4 rounded-2xl border mb-6">

        <button
        onclick="login()"
        class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold mb-3">

            Đăng nhập

        </button>

        <button
        onclick="register()"
        class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-bold">

            Đăng ký

        </button>

    </div>

</div>


<!-- ===================================================== -->
<!-- MAIN APP -->
<!-- ===================================================== -->

<div id="mainApp" class="hidden">

<!-- ===================================================== -->
<!-- HEADER -->
<!-- ===================================================== -->

<header
class="bg-white shadow-lg sticky top-0 z-50">

    <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">

        <div>

            <h1 class="text-3xl font-black text-indigo-700">

                📚 SMART START AI

            </h1>

            <p class="text-slate-500">
                AI English Learning System
            </p>

        </div>

        <div class="flex items-center gap-4">

            <div id="userInfo"
            class="font-bold text-slate-600"></div>

            <button
            onclick="logout()"
            class="bg-red-500 text-white px-5 py-3 rounded-2xl font-bold">

                Logout

            </button>

        </div>

    </div>

</header>


<!-- ===================================================== -->
<!-- MAIN -->
<!-- ===================================================== -->

<main class="max-w-7xl mx-auto p-5">

<!-- ===================================================== -->
<!-- MENU -->
<!-- ===================================================== -->

<div class="grid md:grid-cols-4 gap-5 mb-8">

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">

        <div class="text-5xl mb-3">🎤</div>

        <h3 class="font-black text-xl mb-2">
            AI Speaking
        </h3>

        <p class="text-slate-500">
            Luyện giao tiếp AI
        </p>

    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">

        <div class="text-5xl mb-3">📖</div>

        <h3 class="font-black text-xl mb-2">
            Reading
        </h3>

        <p class="text-slate-500">
            Luyện đọc chuẩn
        </p>

    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">

        <div class="text-5xl mb-3">🎮</div>

        <h3 class="font-black text-xl mb-2">
            Mini Game
        </h3>

        <p class="text-slate-500">
            Học qua trò chơi
        </p>

    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">

        <div class="text-5xl mb-3">⭐</div>

        <h3 class="font-black text-xl mb-2">
            Sao vàng
        </h3>

        <p class="text-slate-500">
            Theo dõi tiến độ
        </p>

    </div>

</div>


<!-- ===================================================== -->
<!-- SMART START CURRICULUM -->
<!-- ===================================================== -->

<section
class="bg-white rounded-3xl p-6 shadow-xl mb-10">

<div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">

    <div>

        <h2 class="text-3xl font-black text-slate-800">

            📚 Smart Start Curriculum

        </h2>

        <p class="text-slate-500">

            Giáo trình lớp 1 → lớp 5

        </p>

    </div>

    <select
    id="gradeSelector"
    onchange="loadGrade(this.value)"
    class="border rounded-2xl p-4 font-bold">

        <option value="grade1">Lớp 1</option>
        <option value="grade2">Lớp 2</option>
        <option value="grade3">Lớp 3</option>
        <option value="grade4">Lớp 4</option>
        <option value="grade5">Lớp 5</option>

    </select>

</div>

<div
id="lessonContainer"
class="grid lg:grid-cols-2 gap-5">

</div>

</section>

</main>

</div>


<!-- ===================================================== -->
<!-- SMART START DATABASE -->
<!-- ===================================================== -->

<script>

const smartStartCurriculum = {

    grade1:{
        units:[
            {
                unit:"Unit 1",
                theme:"Hello",
                image:"👋",
                vocabulary:["hello","teacher","friend"],
                reading:"Hello. My name is Tom."
            },
            {
                unit:"Unit 2",
                theme:"School",
                image:"🎒",
                vocabulary:["book","pen","bag"],
                reading:"This is my school bag."
            }
        ]
    },

    grade2:{
        units:[
            {
                unit:"Unit 1",
                theme:"Animals",
                image:"🐶",
                vocabulary:["dog","cat","bird"],
                reading:"The dog is cute."
            }
        ]
    },

    grade3:{
        units:[
            {
                unit:"Unit 1",
                theme:"House",
                image:"🏠",
                vocabulary:["bedroom","kitchen"],
                reading:"My house is big."
            }
        ]
    },

    grade4:{
        units:[
            {
                unit:"Unit 1",
                theme:"Jobs",
                image:"👩‍⚕️",
                vocabulary:["doctor","teacher"],
                reading:"My father is a doctor."
            }
        ]
    },

    grade5:{
        units:[
            {
                unit:"Unit 1",
                theme:"Technology",
                image:"💻",
                vocabulary:["computer","robot"],
                reading:"Technology helps students."
            }
        ]
    }

};


// =====================================================
// LOAD LESSON
// =====================================================

function loadGrade(grade){

    const container =
    document.getElementById("lessonContainer");

    container.innerHTML = "";

    smartStartCurriculum[grade]
    .units
    .forEach(unit=>{

        const card =
        document.createElement("div");

        card.className =
        "bg-slate-50 rounded-3xl p-5 border";

        card.innerHTML = `

        <div class="flex items-center gap-4 mb-4">

            <div class="text-6xl">
                ${unit.image}
            </div>

            <div>

                <h3 class="font-black text-2xl">
                    ${unit.unit}
                </h3>

                <p class="text-slate-500">
                    ${unit.theme}
                </p>

            </div>

        </div>

        <div class="mb-4">

            <h4 class="font-black mb-2">

                ⭐ Vocabulary

            </h4>

            <div class="flex flex-wrap gap-2">

                ${unit.vocabulary.map(word=>`

                    <button
                    onclick="speak('${word}')"
                    class="bg-indigo-100 px-3 py-2 rounded-xl font-bold">

                        ${word}

                    </button>

                `).join("")}

            </div>

        </div>

        <div>

            <h4 class="font-black mb-2">

                📖 Reading

            </h4>

            <div
            onclick="speak('${unit.reading}')"
            class="bg-white p-4 rounded-2xl cursor-pointer">

                ${unit.reading}

            </div>

        </div>

        `;

        container.appendChild(card);

    });

}


// =====================================================
// SPEAK
// =====================================================

function speak(text){

    const speech =
    new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";

    speech.rate = 0.9;

    speech.pitch = 1;

    window.speechSynthesis.speak(speech);

}


// =====================================================
// AUTO LOAD
// =====================================================

window.onload = ()=>{

    loadGrade("grade1");

}

</script>

</body>
</html>
