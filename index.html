<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Daily ECO AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#f0f7ff,#ffffff,#e0effe);
}

.custom-scrollbar::-webkit-scrollbar{
    width:5px;
}

.custom-scrollbar::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:999px;
}

@keyframes pulse-wave{
    0%,100%{
        transform:scale(1);
        opacity:.6;
    }
    50%{
        transform:scale(1.15);
        opacity:1;
    }
}

.pulse-wave{
    animation:pulse-wave 1.5s infinite;
}

@keyframes bubble-float{
    0%{
        transform:translateY(100%);
        opacity:0;
    }
    100%{
        transform:translateY(-120%);
        opacity:1;
    }
}

.bubble-item{
    animation:bubble-float 6s linear infinite;
}

</style>

</head>

<body class="min-h-screen">

<div class="max-w-6xl mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

<!-- HEADER -->

<div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-5">

    <div class="flex justify-between items-center">

        <div>

            <h1 class="text-2xl font-black">
                English Daily ECO
            </h1>

            <p class="text-xs opacity-80">
                AI Learning Platform
            </p>

        </div>

        <div class="bg-white/20 px-4 py-2 rounded-2xl">

            <div class="text-[10px]">
                💎 Điểm
            </div>

            <div id="point-box"
            class="font-black text-xl">
                0
            </div>

        </div>

    </div>

</div>

<!-- MAIN -->

<div class="grid md:grid-cols-3 gap-4 p-4">

<!-- LEFT -->

<div class="space-y-4">

<!-- SMART START -->

<div class="bg-white border rounded-2xl p-4 shadow-sm">

<h3 class="font-black text-sm mb-3">
📚 Smart Start
</h3>

<select id="smart-class-selector"
class="w-full border rounded-xl p-2 text-sm mb-2">

<option value="1">Lớp 1</option>
<option value="2">Lớp 2</option>
<option value="3">Lớp 3</option>
<option value="4">Lớp 4</option>
<option value="5">Lớp 5</option>

</select>

<select id="smart-theme-selector"
class="w-full border rounded-xl p-2 text-sm">

<option>Family</option>
<option>Animals</option>
<option>School</option>
<option>Food</option>

</select>

</div>

<!-- VOCAB -->

<div class="bg-white border rounded-2xl p-4 shadow-sm">

<h3 class="font-black text-sm mb-3">
⭐ Vocabulary
</h3>

<div class="space-y-2">

<button onclick="speakTextUS('apple')"
class="w-full bg-slate-50 border rounded-xl p-3 flex justify-between items-center">

<span>🍎 apple</span>

<i class="fa-solid fa-volume-high"></i>

</button>

<button onclick="speakTextUS('banana')"
class="w-full bg-slate-50 border rounded-xl p-3 flex justify-between items-center">

<span>🍌 banana</span>

<i class="fa-solid fa-volume-high"></i>

</button>

<button onclick="speakTextUS('teacher')"
class="w-full bg-slate-50 border rounded-xl p-3 flex justify-between items-center">

<span>👩‍🏫 teacher</span>

<i class="fa-solid fa-volume-high"></i>

</button>

</div>

</div>

</div>

<!-- CENTER -->

<div class="space-y-4">

<!-- AI CHAT -->

<div class="bg-white border rounded-2xl shadow-sm flex flex-col h-[650px]">

<div class="p-4 border-b">

<h3 class="font-black text-sm">
🤖 AI Conversation
</h3>

</div>

<div id="chat-box"
class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">

<div class="bg-slate-100 p-3 rounded-2xl max-w-[85%]">
Hello student 👋
</div>

</div>

<div class="p-3 border-t">

<div id="voice-wave-indicator"
class="hidden justify-center mb-2">

<div class="w-2 h-8 bg-red-500 rounded-full pulse-wave"></div>

</div>

<div class="flex gap-2">

<input id="chat-input"
class="flex-1 border rounded-2xl px-4 py-3"
placeholder="Nhập hoặc nói tiếng Anh...">

<button onclick="sendChat()"
class="w-12 h-12 rounded-2xl bg-blue-600 text-white">

<i class="fa-solid fa-paper-plane"></i>

</button>

<button onclick="toggleVoice()"
class="w-12 h-12 rounded-2xl bg-emerald-600 text-white">

<i class="fa-solid fa-microphone"></i>

</button>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="space-y-4">

<!-- GAME -->

<div class="bg-white border rounded-2xl p-4 shadow-sm">

<div class="flex gap-2 mb-3">

<button onclick="switchGame('bubble')"
class="flex-1 bg-emerald-500 text-white rounded-xl py-2 text-xs font-black">

Bubble

</button>

<button onclick="switchGame('memory')"
class="flex-1 bg-violet-500 text-white rounded-xl py-2 text-xs font-black">

Memory

</button>

<button onclick="switchGame('typing')"
class="flex-1 bg-orange-500 text-white rounded-xl py-2 text-xs font-black">

Typing

</button>

</div>

<!-- BUBBLE -->

<div id="bubble-game"
class="bg-slate-900 rounded-2xl h-80 relative overflow-hidden">

<button class="bubble-item absolute bottom-0 left-10 bg-pink-500 text-white rounded-full w-16 h-16">
apple
</button>

</div>

<!-- MEMORY -->

<div id="memory-game"
class="hidden grid grid-cols-4 gap-2">

</div>

<!-- TYPING -->

<div id="typing-game"
class="hidden text-center">

<div id="typing-word"
class="text-3xl font-black text-orange-500 mb-4">

apple

</div>

<input id="typing-input"
class="w-full border rounded-xl p-3 text-center"
placeholder="Nhập từ">

<button onclick="checkTyping()"
class="mt-3 bg-orange-500 text-white rounded-xl px-5 py-3 font-black">

KIỂM TRA

</button>

</div>

</div>

<!-- SHOP -->

<div class="bg-white border rounded-2xl p-4 shadow-sm">

<h3 class="font-black text-sm mb-3">
🛍️ Pet Shop
</h3>

<div class="grid grid-cols-2 gap-3">

<div class="bg-pink-50 rounded-2xl p-3 text-center">

<div class="text-5xl">
👾
</div>

<div class="font-black text-xs mt-2">
Labubu
</div>

<button onclick="buyPet('Labubu',100)"
class="mt-2 bg-pink-500 text-white rounded-xl px-3 py-2 text-xs">

100 💎

</button>

</div>

<div class="bg-yellow-50 rounded-2xl p-3 text-center">

<div class="text-5xl">
🐹
</div>

<div class="font-black text-xs mt-2">
Capybara
</div>

<button onclick="buyPet('Capybara',120)"
class="mt-2 bg-yellow-500 text-white rounded-xl px-3 py-2 text-xs">

120 💎

</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

let studentPoints = 0;

let currentTypingWord = "apple";

const typingWords = [
"apple",
"banana",
"teacher",
"computer",
"beautiful"
];

function updatePointBox(){

    document.getElementById("point-box")
    .innerText = studentPoints;

}

function speakTextUS(text){

    const utter =
    new SpeechSynthesisUtterance(text);

    utter.lang = "en-US";

    speechSynthesis.speak(utter);

}

function sendChat(){

    const input =
    document.getElementById("chat-input");

    const text = input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    input.value = "";

    setTimeout(()=>{

        addMessage(
        "Great job! Keep speaking English 😊",
        "ai"
        );

        speakTextUS(
        "Great job! Keep speaking English"
        );

    },800);

}

function addMessage(text,type){

    const box =
    document.getElementById("chat-box");

    const div =
    document.createElement("div");

    div.className =
    type === "user"
    ?
    "bg-blue-600 text-white p-3 rounded-2xl ml-auto max-w-[85%]"
    :
    "bg-slate-100 p-3 rounded-2xl max-w-[85%]";

    div.innerText = text;

    box.appendChild(div);

    box.scrollTop = box.scrollHeight;

}

function toggleVoice(){

    const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        alert("Không hỗ trợ micro");

        return;
    }

    const recog =
    new SpeechRecognition();

    recog.lang = "en-US";

    recog.start();

    document
    .getElementById("voice-wave-indicator")
    .classList.remove("hidden");

    recog.onresult = (e)=>{

        const text =
        e.results[0][0].transcript;

        document
        .getElementById("chat-input")
        .value = text;

    };

    recog.onend = ()=>{

        document
        .getElementById("voice-wave-indicator")
        .classList.add("hidden");

    };

}

function switchGame(mode){

    document.getElementById("bubble-game")
    .classList.add("hidden");

    document.getElementById("memory-game")
    .classList.add("hidden");

    document.getElementById("typing-game")
    .classList.add("hidden");

    if(mode === "bubble"){

        document
        .getElementById("bubble-game")
        .classList.remove("hidden");

    }

    if(mode === "memory"){

        document
        .getElementById("memory-game")
        .classList.remove("hidden");

        startMemory();

    }

    if(mode === "typing"){

        document
        .getElementById("typing-game")
        .classList.remove("hidden");

        startTyping();

    }

}

function startTyping(){

    currentTypingWord =
    typingWords[
        Math.floor(
            Math.random()*typingWords.length
        )
    ];

    document
    .getElementById("typing-word")
    .innerText =
    currentTypingWord;

}

function checkTyping(){

    const val =
    document.getElementById("typing-input")
    .value
    .trim()
    .toLowerCase();

    if(val === currentTypingWord){

        studentPoints += 10;

        updatePointBox();

        alert("Chính xác +10 💎");

        startTyping();

    }else{

        alert("Sai rồi");

    }

}

function buyPet(name,price){

    if(studentPoints < price){

        alert("Không đủ điểm");

        return;

    }

    studentPoints -= price;

    updatePointBox();

    alert("Đã mua " + name);

}

function startMemory(){

    const icons = [
    "🐶","🐱","🐰","🐹",
    "🐶","🐱","🐰","🐹"
    ];

    icons.sort(()=>Math.random()-0.5);

    const grid =
    document.getElementById("memory-game");

    grid.innerHTML = "";

    let first = null;

    icons.forEach(icon=>{

        const card =
        document.createElement("button");

        card.className =
        "aspect-square rounded-xl bg-slate-100 text-2xl";

        card.innerText = "❓";

        card.onclick = ()=>{

            card.innerText = icon;

            if(!first){

                first = {
                    icon,
                    card
                };

            }else{

                if(first.icon === icon){

                    studentPoints += 5;

                    updatePointBox();

                }else{

                    setTimeout(()=>{

                        first.card.innerText = "❓";

                        card.innerText = "❓";

                    },500);

                }

                first = null;

            }

        };

        grid.appendChild(card);

    });

}

updatePointBox();

</script>

</body>
</html>
